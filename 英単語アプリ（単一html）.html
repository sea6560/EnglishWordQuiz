<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英単語アプリ</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .word {
      font-size: 24px;
      margin-bottom: 20px;
    }
    .meaning {
      font-size: 18px;
      margin-bottom: 20px;
      color: #333;
      display: none;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
    }
    button:active {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="word" id="word">word</div>
    <div class="meaning" id="meaning">意味</div>
    <button onclick="showMeaning()">意味表示</button>
    <button onclick="nextWord()">次へ</button>
  </div>

  <script>
    const data = [
      { "word": "apple", "meaning": "りんご" },
      { "word": "book", "meaning": "本" },
      { "word": "run", "meaning": "走る" },
      { "word": "eat", "meaning": "食べる" },
      { "word": "beautiful", "meaning": "美しい" }
    ];

    let current = null;

    function nextWord() {
      const index = Math.floor(Math.random() * data.length);
      current = data[index];

      document.getElementById("word").textContent = current.word;
      document.getElementById("meaning").textContent = current.meaning;
      document.getElementById("meaning").style.display = "none";
    }

    function showMeaning() {
      document.getElementById("meaning").style.display = "block";
    }

    // 初期表示
    nextWord();
  </script>
</body>
</html>
